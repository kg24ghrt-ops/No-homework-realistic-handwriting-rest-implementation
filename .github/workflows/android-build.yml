name: Android Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # -------------------------
      # Stable Node (fix sdkmanager instability)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # Java (required for Android SDK tools)
      # -------------------------
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # -------------------------
      # Rust
      # -------------------------
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
          targets: aarch64-linux-android

      # -------------------------
      # Cache
      # -------------------------
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # -------------------------
      # Android SDK (AUTO-MANAGED)
      # -------------------------
      - name: Setup Android SDK (auto-resolved)
        uses: android-actions/setup-android@v3

      # -------------------------
      # Install cargo-apk
      # -------------------------
      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      # -------------------------
      # Build APK
      # -------------------------
      - name: Build Android APK
        working-directory: android-app
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk
        run: |
          cargo apk build --release --locked

      # -------------------------
      # Debug output (important for future runtime crashes)
      # -------------------------
      - name: Collect Build Output
        if: always()
        run: |
          echo "=== APK OUTPUT ==="
          find android-app/target -name "*.apk" || true

          echo "=== TARGET TREE ==="
          ls -R android-app/target || true

      # -------------------------
      # Upload APK
      # -------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homework-engine-apk
          path: android-app/target/**/release/apk/*.apk
          if-no-files-found: error