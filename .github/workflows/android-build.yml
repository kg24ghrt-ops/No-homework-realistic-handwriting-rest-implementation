name: Android Build Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
          targets: aarch64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Show Tool Versions
        run: |
          rustc --version
          cargo --version
          java -version
          sdkmanager --version

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Build Android APK
        working-directory: android-app
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          cargo apk build --release

      - name: Show Build Output
        if: always()
        run: |
          echo "===== android-app ====="
          ls -R android-app || true

          echo "===== target ====="
          ls -R android-app/target || true

          echo "===== APK Files ====="
          find android-app -name "*.apk" || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: homework-engine-release-apk
          path: android-app/**/*.apk
          if-no-files-found: error
          retention-days: 14