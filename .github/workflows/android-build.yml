name: Android Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository codebase
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up the Rust toolchain with the modern Android cross-compilation target
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      # 3. Optimize pipeline speeds by caching dependencies
      - name: Cache Cargo Dependencies
        uses: swatinem/rust-cache@v2

      # 4. Install cargo-apk binary utility manager
      - name: Install cargo-apk
        run: cargo install cargo-apk

      # 5. Bootstrap the Android NDK environment for low-level machine compilation
      - name: Setup Android NDK
        id: setup-ndk
        uses: nwtgck/actions-setup-android-ndk@v1
        with:
          ndk-version: r26b

      # 6. Execute native compilation pass directly inside the android-app workspace folder
      - name: Build Android APK (Release)
        working-directory: android-app
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cargo apk build --release

      # 7. Harvest the final compiled .apk package file from the local build targets
      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: homework-engine-release-apk
          path: target/release/apk/homework-engine-app.apk
