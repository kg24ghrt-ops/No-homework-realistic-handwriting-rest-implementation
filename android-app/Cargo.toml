[package]
name = "homework-engine-app"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
core = { path = "../core" }
paper = { path = "../paper" }
natural-style = { path = "../styles/natural" }
image = { version = "0.25", default-features = false, features = ["png"] }
egui = "0.27"
egui-winit = "0.27"
egui_glow = "0.27"
egui_extras = { version = "0.27", features = ["image"] }
glow = "0.13"
winit = { version = "0.30", features = ["android-native-activity"] }
# Explicitly add android-activity with the required feature
android-activity = { version = "0.5", features = ["native-activity"] }
serde_json = "1"

[package.metadata.android]
build_targets = ["aarch64-linux-android"]
apk_label = "Homework Engine"
activity = "android.app.NativeActivity"