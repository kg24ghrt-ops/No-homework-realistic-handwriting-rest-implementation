[package]
name = "homework-engine-app"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]          # needed by cargo-apk

[dependencies]
# Our engine crates (unchanged)
core = { path = "../core" }
paper = { path = "../paper" }
natural-style = { path = "../styles/natural" }

# Image I/O (PNG)
image = { version = "0.25", default-features = false, features = ["png"] }

# UI
egui = "0.27"
egui-winit = "0.27"
egui_extras = { version = "0.27", features = ["image"] }
egui-wgpu = "0.27"               # software renderer (no GPU)
winit = "0.30"

# Android glue
android-activity = { version = "0.5", features = ["native-activity"] }

# JSON for seed/params (optional)
serde_json = "1"

[package.metadata.android]
build_targets = ["aarch64-linux-android"]   # you can add more ABIs
apk_label = "Homework Engine"
activity = "android.app.NativeActivity"